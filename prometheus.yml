global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "typescript"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          app: "node-api-performance-validation"

  - job_name: "rust"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3100"]
        labels:
          app: "node-api-performance-validation"

  - job_name: "zig"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3200"]
        labels:
          app: "node-api-performance-validation"
