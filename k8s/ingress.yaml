# ============================================================
# Ingress — expose all services via a single ingress
# Requires an ingress controller (e.g. nginx-ingress)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-api-ingress
  namespace: node-api-perf
  labels:
    app.kubernetes.io/part-of: node-api-performance-validation
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: node-api.local
      http:
        paths:
          # TypeScript API
          - path: /ts(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-typescript
                port:
                  number: 3000

          # Rust API
          - path: /rs(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-rust
                port:
                  number: 3100

          # Zig API
          - path: /zg(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-zig
                port:
                  number: 3200

          # Prometheus
          - path: /prometheus(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

          # Grafana
          - path: /grafana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana
                port:
                  number: 3000
